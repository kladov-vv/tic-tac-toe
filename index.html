<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
</head>
<body></body>
    <dialog closedby="any">
        <form method="dialog">
            <div class="input-container">
                <label for="player-1-name">Player One</label>
                <input 
                    type="text" 
                    required 
                    autocomplete="off" 
                    maxlength="20"
                    id="player-1-name" 
                    name="player1Name"
                />
            </div>
            <div class="input-container">
                <label for="player-2-name">Player Two</label>
                <input 
                    type="text" 
                    required 
                    autocomplete="off" 
                    maxlength="20"
                    id="player-2-name" 
                    name="player2Name" 
                />
            </div>
            <button>Start</button>
            <button type="button" class="btn-close-dialog">Close</button>
        </form>
    </dialog>
    <div class="container">    
        <div class="header">
            <h1>Tic-Tac-Toe</h1>
            <button class="btn-start">Start</button>
        </div>
        <div class="content">
            <div class="status-bar"></div>
            <div class="player-container player-1">
                <div class="player-marker">&#x2715</div>
                <h2 class="player-name"></h2>
                <div class="player-score"></div>
            </div>
            <div class="game-board">
                <div id="place-0"></div>
                <div id="place-1"></div>
                <div id="place-2"></div>
                <div id="place-3"></div>
                <div id="place-4"></div>
                <div id="place-5"></div>
                <div id="place-6"></div>
                <div id="place-7"></div>
                <div id="place-8"></div>
            </div>
            <div class="player-container player-2">
                <div class="player-marker">&#x25EF</div>
                <h2 class="player-name"></h2>
                <div class="player-score"></div>
            </div>
        </div>
    </div>
</body>
</html>
